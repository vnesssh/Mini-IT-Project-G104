<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MMU RateMyProfessor{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F5F2ED;
      --surface:  #FFFFFF;
      --border:   #E2DDD5;
      --text:     #1A1714;
      --muted:    #7A7268;
      --accent:   #C84B2F;
      --accent-l: #FAE8E4;
      --gold:     #D4922A;
      --gold-l:   #FDF3E0;
      --green:    #2D7A4F;
      --green-l:  #E4F3EB;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--text);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: #fff;
      text-decoration: none;
    }
    .nav-logo span { color: var(--gold); }
    .nav-links a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #fff; }

    /* LAYOUT */
    .container { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* FLASH MESSAGES */
    .flash { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 1.5rem; }
    .flash.success { background: var(--green-l); color: var(--green); border: 1px solid #b6dfc7; }
    .flash.error   { background: var(--accent-l); color: var(--accent); border: 1px solid #f3c4b8; }

    /* STARS */
    .stars { display: inline-flex; gap: 2px; }
    .star  { font-size: 14px; }
    .star.filled { color: var(--gold); }
    .star.empty  { color: #D8D3CB; }

    /* SCORE PILL */
    .score-pill {
      display: inline-flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; border-radius: 50%;
      font-size: 16px; font-weight: 600;
      flex-shrink: 0;
    }
    .score-pill.high   { background: var(--green-l); color: var(--green); }
    .score-pill.mid    { background: var(--gold-l);  color: var(--gold); }
    .score-pill.low    { background: var(--accent-l); color: var(--accent); }
    .score-pill.none   { background: var(--border); color: var(--muted); font-size: 11px; }

    /* BUTTONS */
    .btn {
      display: inline-block; padding: 10px 22px; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      text-decoration: none; cursor: pointer; border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline {
      background: transparent; color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { background: var(--border); }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">MMU <span>Rate</span>Prof</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/admin/add-lecturer">Add Lecturer</a>
  </div>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
