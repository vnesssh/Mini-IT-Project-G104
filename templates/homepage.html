<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MMU RateMyProfessor</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="navbar">
    <div class="nav-logo">
      <span class="mm">MM</span><span class="u">U</span>
    </div>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="#">Browse</a>
      <a href="#">About</a>
      <a href="/admin" style="color: var(--dark-blue); font-weight: 600; border-left: 1px solid var(--border); padding-left: 20px; margin-left: 4px;"> Admin</a>
    </nav>
  </header>

  <main class="hero">
    <h1 class="site-title">
      <span class="mm">MM</span><span class="u">U</span><span class="rest"> RateMyProfessor</span>
    </h1>
    <p class="tagline">Find honest reviews for every professor at Multimedia University.</p>

    <div class="search-wrapper">
      <div class="search-bar" id="main-search-bar">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <div class="autocomplete-wrapper">
          <input type="text" id="search-input" placeholder="Search for a professor..." autocomplete="off" />
          <ul class="autocomplete-dropdown" id="autocomplete-list"></ul>
        </div>
        <button class="search-btn" onclick="doSearch()">Search</button>
      </div>
    </div>

    <div class="result-card" id="result-card" style="display:none;"></div>
  </main>

  <!-- -------- ADMIN ---------- -->
  <!-- CHANGED: href from /add-professor to /request-professor -->
  <!-- CHANGED: button text from "+ Add a Professor" to "+ Request a Professor" -->
  <div class="add-btn-wrapper">
    <a href="/request-professor" class="add-btn">+ Request a Professor</a>
  </div>
  <!-- -------- ADMIN ---------- -->

  <footer class="footer">
    <p>&copy; 2026 MMU RateMyProfessor. All rights reserved.</p>
  </footer>

  <script>
    const input    = document.getElementById("search-input");
    const dropdown = document.getElementById("autocomplete-list");
    const card     = document.getElementById("result-card");
    let timer;

    input.addEventListener("input", () => {
      clearTimeout(timer);
      const q = input.value.trim();
      if (!q) { closeDropdown(); return; }
      timer = setTimeout(() => fetchSuggestions(q), 200);
    });

    input.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });
    document.addEventListener("click", e => { if (!e.target.closest(".search-bar")) closeDropdown(); });

    async function fetchSuggestions(q) {
      const data = await apiFetch(q);
      renderDropdown(data);
    }

    async function apiFetch(q) {
      try {
        const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        return await r.json();
      } catch { return []; }
    }

    function renderDropdown(list) {
      dropdown.innerHTML = "";
      if (!list.length) { closeDropdown(); return; }
      list.slice(0, 7).forEach(p => {
        const li = document.createElement("li");
        li.className = "autocomplete-item";
        li.innerHTML = `
          <span class="ac-name">${hl(p.name, input.value)}</span>
          <span class="ac-subjects">${p.course_code || ""} ${p.course ? "· " + p.course : ""}</span>`;
        li.addEventListener("mousedown", () => pick(p));
        dropdown.appendChild(li);
      });
      dropdown.style.display = "block";
    }

    function hl(text, q) {
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi");
      return text.replace(re, "<strong>$1</strong>");
    }

    function pick(p) {
      input.value = p.name;
      closeDropdown();
      window.location.href = `/lecturer/${p.id}`;
    }

    function closeDropdown() {
      dropdown.style.display = "none";
      dropdown.innerHTML = "";
    }

    async function doSearch() {
      const q = input.value.trim();
      if (!q) return;
      closeDropdown();
      const data = await apiFetch(q);
      if (data.length === 1) {
        window.location.href = `/lecturer/${data[0].id}`;
      } else if (data.length > 1) {
        showMultiple(data);
      } else {
        card.style.display = "block";
        card.innerHTML = `<p class="no-result">No professor found for "<strong>${q}</strong>".</p>`;
      }
    }

    function showMultiple(list) {
      card.style.display = "block";
      card.innerHTML = `
        <p class="result-count">${list.length} professors found — click to view profile:</p>
        <ul class="result-list">
          ${list.map(p => `
            <li class="result-list-item" onclick="window.location='/lecturer/${p.id}'">
              <strong>${p.name}</strong>
              <span>${p.course_code || ""} ${p.faculty ? "· " + p.faculty : ""}</span>
              ${p.overall ? `<span class="badge-score" style="background:${scoreColor(p.overall)}">${p.overall}</span>` : ""}
            </li>`).join("")}
        </ul>`;
    }

    function scoreColor(s) {
      if (s >= 4) return "#2ecc71";
      if (s >= 2.5) return "#f39c12";
      return "#e74c3c";
    }
  </script>

</body>
</html>
